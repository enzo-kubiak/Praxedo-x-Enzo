name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # Build & test — file-service (Spring Boot)
  # ─────────────────────────────────────────────
  build-file-service:
    name: Build file-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & test
        run: mvn clean verify -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-service-jar
          path: backend/target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # Build & test — scanner-service (Spring Boot)
  # ─────────────────────────────────────────────
  build-scanner-service:
    name: Build scanner-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scanner-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & test
        run: mvn clean verify -DskipTests

  # ─────────────────────────────────────────────
  # Build — React frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Docker build check — verifies all Dockerfiles
  # build successfully (no push, local only)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [build-file-service, build-scanner-service, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build file-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: praxedo/file-service:ci

      - name: Build scanner-service image
        uses: docker/build-push-action@v5
        with:
          context: ./scanner-service
          push: false
          tags: praxedo/scanner-service:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: praxedo/frontend:ci
