server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: file-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:securefiles}
    username: ${DB_USER:praxedo}
    password: ${DB_PASSWORD:praxedo}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:secure-files}

scanner:
  url: ${SCANNER_URL:http://localhost:8090}

scan:
  scheduler:
    fixed-rate-ms: 10000

# Actuator et métriques Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      service: file-service
      instance: ${SERVER_PORT:8080}

logging:
  level:
    com.praxedo: DEBUG
