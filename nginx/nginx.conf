upstream backend_servers {
    # Round-robin load balancing between two Spring Boot instances
    server backend1:8080;
    server backend2:8080;

    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # Increase body size for large file uploads (500MB)
    client_max_body_size 500M;

    # Increase timeouts for large uploads and slow scans
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    # API — proxied to Spring Boot cluster
    location /api/ {
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://backend_servers/actuator/health;
        proxy_set_header Host $host;
    }

    # React SPA — served from the frontend container
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
