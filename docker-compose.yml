services:

  # ─────────────────────────────────────────
  # PostgreSQL — metadata storage
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: praxedo-postgres
    environment:
      POSTGRES_DB: securefiles
      POSTGRES_USER: praxedo
      POSTGRES_PASSWORD: praxedo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxedo -d securefiles"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: praxedo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ClamAV — daemon officiel, port TCP 3310
  # Le backend lui parle via protocole INSTREAM
  # ─────────────────────────────────────────
  clamav:
    image: clamav/clamav
    container_name: praxedo-clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 500s

  # ─────────────────────────────────────────
  # scanner-service — REST antivirus API
  # Expose POST /scan, talks to clamd TCP
  # ─────────────────────────────────────────
  scanner-service:
    build:
      context: ./scanner-service
      dockerfile: Dockerfile
    container_name: praxedo-scanner
    environment:
      SERVER_PORT: 8090
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    ports:
      - "8090:8090"
    depends_on:
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 500s

  # ─────────────────────────────────────────
  # Spring Boot — instance 1
  # ─────────────────────────────────────────
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxedo-backend1
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: securefiles
      DB_USER: praxedo
      DB_PASSWORD: praxedo
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secure-files
      SCANNER_URL: http://scanner-service:8090
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      scanner-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Spring Boot — instance 2 (load balanced)
  # ─────────────────────────────────────────
  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxedo-backend2
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: securefiles
      DB_USER: praxedo
      DB_PASSWORD: praxedo
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secure-files
      SCANNER_URL: http://scanner-service:8090
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      scanner-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # React frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: praxedo-frontend
    environment:
      VITE_API_URL: http://localhost/api
    depends_on:
      - backend1
      - backend2

  # ─────────────────────────────────────────
  # Nginx — reverse proxy + load balancer
  # Entry point: http://localhost
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: praxedo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2
      - frontend

volumes:
  postgres_data:
  minio_data:
