services:

  postgres:
    image: postgres:16-alpine
    container_name: praxedo-postgres
    environment:
      POSTGRES_DB: securefiles
      POSTGRES_USER: praxedo
      POSTGRES_PASSWORD: praxedo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxedo -d securefiles"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: praxedo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Expose les métriques Prometheus sans authentification
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    container_name: praxedo-clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  scanner-service:
    build:
      context: ./scanner-service
      dockerfile: Dockerfile
    container_name: praxedo-scanner
    environment:
      SERVER_PORT: 8090
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    ports:
      - "8090:8090"
    depends_on:
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxedo-backend1
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: securefiles
      DB_USER: praxedo
      DB_PASSWORD: praxedo
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secure-files
      SCANNER_URL: http://scanner-service:8090
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      scanner-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxedo-backend2
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: securefiles
      DB_USER: praxedo
      DB_PASSWORD: praxedo
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secure-files
      SCANNER_URL: http://scanner-service:8090
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      scanner-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: praxedo-frontend
    depends_on:
      - backend1
      - backend2

  nginx:
    image: nginx:alpine
    container_name: praxedo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2
      - frontend

  prometheus:
    image: prom/prometheus:latest
    container_name: praxedo-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    depends_on:
      - backend1
      - backend2
      - scanner-service

  # Grafana — http://localhost:3001  (admin / admin)
  # SMTP configuré pour les alertes mail
  grafana:
    image: grafana/grafana:latest
    container_name: praxedo-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # ── SMTP pour les alertes mail ──────────────
      # Remplace par ton SMTP réel pour la prod
      # Ici on utilise Gmail (nécessite un mot de passe d'application)
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: "enzokubiak95@gmail.com"
      GF_SMTP_PASSWORD: "${GMAIL_APP_PASSWORD}"   # défini dans .env
      GF_SMTP_FROM_ADDRESS: "enzokubiak95@gmail.com"
      GF_SMTP_FROM_NAME: "Praxedo Monitoring"
      GF_SMTP_STARTTLS_POLICY: "MandatoryStartTLS"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
