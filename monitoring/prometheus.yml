global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'file-service-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend1:8080']
        labels:
          instance: 'file-service-1'
          service: 'file-service'

  - job_name: 'file-service-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend2:8080']
        labels:
          instance: 'file-service-2'
          service: 'file-service'

  - job_name: 'scanner-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['scanner-service:8090']
        labels:
          service: 'scanner-service'

  # MinIO métriques publiques (nécessite MINIO_PROMETHEUS_AUTH_TYPE=public)
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'minio'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
